name: CI-CD Pipeline

on: push

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit test
        run: python -m pytest tests/test_telecom_tax.py -v

      - name: Run Selenium UI test
        run: python -m pytest tests/test_ui_selenium.py -v

      - name: Deploy
        if: ${{ success() }}
        run: echo "All tests passed! Application successfully deployed to production."